name: CI Test

on:
  push:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Build image
      run: docker build -t hair-site .

    - name: Run container
      run: docker run -d -p 8080:80 --name web hair-site

    - name: Wait for startup
      run: sleep 8

    - name: Check containers
      run: docker ps -a

    - name: Test endpoint
      run: curl --fail http://localhost:8080

    - name: Cleanup
      run: docker stop web || true